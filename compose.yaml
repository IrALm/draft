services:

  postgres-keycloak:
    image: postgres:16.4-alpine
    container_name: postgres-keycloak
    restart: unless-stopped

    labels:
      # Empeche Spring Boot Docker Compose d'auto-detecter cette DB comme
      # datasource de l'appli : elle appartient a Keycloak, pas au backend.
      - "org.springframework.boot.ignore=true"

    environment:
      POSTGRES_DB: ${POSTGRES_KEYCLOAK_DB}
      POSTGRES_USER: ${POSTGRES_KEYCLOAK_USER}
      POSTGRES_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_KEYCLOAK_USER} -d ${POSTGRES_KEYCLOAK_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data

    networks:
      - keycloak-network


  postgres-metier:
    image: postgres:16.4-alpine
    container_name: postgres-metier
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_METIER_DB}
      POSTGRES_USER: ${POSTGRES_METIER_USER}
      POSTGRES_PASSWORD: ${POSTGRES_METIER_PASSWORD}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_METIER_USER} -d ${POSTGRES_METIER_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

    ports:
      - "127.0.0.1:5433:5432"

    volumes:
      - metier_postgres_data:/var/lib/postgresql/data

    networks:
      - metier-network


  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    container_name: keycloak
    restart: unless-stopped

    depends_on:
      postgres-keycloak:
        condition: service_healthy

    ports:
      - "127.0.0.1:8081:8080"

    environment:

      # PostgreSQL
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/${POSTGRES_KEYCLOAK_DB}
      KC_DB_USERNAME: ${POSTGRES_KEYCLOAK_USER}
      KC_DB_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD}

      # Admin Keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}

      # Secret du client de service applicatif (KeycloakAdminClient), substitue
      # dans keycloak/realm-export.json au moment de l'import du realm
      KC_APP_CLIENT_SECRET: ${KC_APP_CLIENT_SECRET}

      # Secret du client BFF (login/logout backend-mediated), substitue de la
      # meme maniere dans realm-export.json (client api-compta-bff)
      KC_BFF_CLIENT_SECRET: ${KC_BFF_CLIENT_SECRET}

      # Dev only: autorise l'acces via localhost sans hostname strict/TLS
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"

      # Dev only: recharge le theme a chaque requete (pas de cache), pour
      # iterer sur keycloak/themes/ sans redemarrer le conteneur.
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"

    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./keycloak/themes/erp-comptable:/opt/keycloak/themes/erp-comptable:ro

    command:
      - start-dev
      - --import-realm

    networks:
      - keycloak-network


  pgadmin:
    image: dpage/pgadmin4:8.12
    container_name: pgadmin

    restart: unless-stopped

    depends_on:
      postgres-keycloak:
        condition: service_healthy
      postgres-metier:
        condition: service_healthy

    ports:
      - "127.0.0.1:5050:80"

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    networks:
      - keycloak-network
      - metier-network


volumes:

  keycloak_postgres_data:
  metier_postgres_data:
  pgadmin_data:


networks:

  keycloak-network:
  metier-network:
